services:
  reconciler:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    environment:
      - DB_PATH=/data/entitlements.db
      - CARRIER_URL=http://mock-carrier:8081
    depends_on:
      - mock-carrier
    restart: unless-stopped

  mock-carrier:
    build:
      context: .
      dockerfile: Dockerfile.mock
    ports:
      - "8081:8081"

volumes:
  db-data:
